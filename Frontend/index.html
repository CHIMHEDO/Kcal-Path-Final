<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ - Calorie Tracker</title>
</head>
<body>

    <h2>เข้าสู่ระบบ (Login)</h2>
    
    <form id="loginForm">
        <div>
            <label>ชื่อผู้ใช้ (Username):</label>
            <input type="text" id="username" required>
        </div>
        <br>
        <div>
            <label>รหัสผ่าน (Password):</label>
            <input type="password" id="password" required>
        </div>
        <br>
        <button type="submit">เข้าสู่ระบบ</button>
    </form>

    <br>
    <p>ยังไม่มีบัญชีใช่ไหม? <a href="register.html">สมัครสมาชิกที่นี่</a></p>

    <p id="errorMessage" style="color: red;"></p>
     

    <script>
        // 1. ดักจับเหตุการณ์เมื่อผู้ใช้กดปุ่ม "เข้าสู่ระบบ" (Submit Form)
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            
            // 2. สั่งเบรก! ไม่ให้หน้าเว็บรีเฟรชตัวเอง (พฤติกรรมดั้งเดิมของ HTML Form)
            e.preventDefault(); 

            // 3. ดึงข้อความที่ผู้ใช้พิมพ์ในช่อง Username และ Password ออกมา
            const usernameInput = document.getElementById('username').value.trim();
            const passwordInput = document.getElementById('password').value.trim();
            const errorText = document.getElementById('errorMessage');

            // ล้างข้อความ Error เก่าทิ้งก่อน (ถ้ามี)
            errorText.innerText = '';

            try {
                // 4. ส่ง "คนเดินสาส์น" (fetch) เอาข้อมูลไปถาม Backend ของเรา
                const response = await fetch('http://localhost:3000/login', {
                    method: 'POST', // ใช้ POST เพราะเป็นการส่งข้อมูลความลับ
                    headers: {
                        'Content-Type': 'application/json' // บอก Backend ว่าเราส่งข้อมูลรูปแบบ JSON ไปนะ
                    },
                    body: JSON.stringify({ 
                        username: usernameInput, 
                        password: passwordInput 
                    })
                });

                // 5. แกะกล่องข้อความที่ Backend ตอบกลับมา
                const data = await response.json();

                if (response.ok) {
                    // --- กรณีที่ 1: รหัสผ่านถูกต้อง! (Backend ตอบ Status 200) ---
                    alert('เข้าสู่ระบบสำเร็จ! 🎉');

                    // 🌟 จุดสำคัญ: หน้าเว็บมัน "ความจำสั้น" พอเปลี่ยนหน้ามันจะลืมว่าเราเป็นใคร
                    // เราเลยต้องฝากข้อมูล User ID ไว้ใน "ความจำของเบราว์เซอร์ (localStorage)"
                    localStorage.setItem('userId', data.user.id);
                    localStorage.setItem('username', data.user.username);

                    // สั่งให้เบราว์เซอร์เปลี่ยนหน้าไปที่ Dashboard
                    window.location.href = 'dashboard.html';

                } else {
                    // --- กรณีที่ 2: รหัสผิด หรือไม่มีชื่อผู้ใช้นี้ (Backend ตอบ Status 401 หรืออื่นๆ) ---
                    // เอาข้อความ Error จาก Backend มาโชว์ตัวแดงๆ บนหน้าเว็บ
                    errorText.innerText = data.error;
                }

            } catch (error) {
                // --- กรณีที่ 3: ติดต่อ Backend ไม่ได้ (เช่น ลืมเปิดเซิร์ฟเวอร์) ---
                console.error('Error:', error);
                errorText.innerText = 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้ กรุณาลองใหม่';
            }
        });
    </script>
</body>
</html>
