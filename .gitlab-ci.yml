# 1. กำหนดลำดับขั้นตอน
stages:
  - build
  - test
  - deploy

# 2. ตั้งค่าตัวแปรกลาง
variables:
  NODE_IMAGE: node:20-slim

# --- ✨ เพิ่มระบบ Cache ตรงนี้ ✨ ---
cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - vue-frontend/node_modules/

# 3. ขั้นตอนการประกอบร่าง (Build)
build_vue_app:
  stage: build
  image: $NODE_IMAGE
  script:
    - cd vue-frontend
    - echo "เริ่มติดตั้ง Library..."
    - npm install
    - echo "เริ่ม Build โปรเจกต์..."
    - npm run build
  artifacts:
    paths:
      - vue-frontend/dist/
    expire_in: 1 week

# 4. ขั้นตอนการทดสอบ (Test)
test_vue_app:
  stage: test
  image: $NODE_IMAGE
  script:
    - cd vue-frontend
    - npm install # (ดึงจาก Cache จะเร็วมาก)
    - echo "กำลังตรวจสอบคุณภาพโค้ด..."
    - npm run lint
    # - npm run test:unit

# 5. ขั้นตอนการนำไปใช้งาน (Deploy)
deploy-vercel:
  stage: deploy
  image: node:20
  variables:
    TOKEN: $VERCEL_TOKEN
    VERCEL_ORG_ID: $VERCEL_ORG_ID_X
    VERCEL_PROJECT_ID: $VERCEL_PROJECT_ID_X
  script:
    - npm install --global vercel
    - cd vue-frontend
    - vercel pull --yes --environment=production --token="$TOKEN"
    - vercel build --prod --token="$TOKEN"
    - vercel deploy --prebuilt --prod --token="$TOKEN"
  only:
    - main